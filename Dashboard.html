<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js">// Anand Marga sliding ticker content
const amItems=[
 {t:'RU News',l:'https://anandamarga.org'},
 {t:'Service Reports',l:'https://anandamarga.org/service'},
 {t:'Prout Updates',l:'https://proutglobe.org'},
 {t:'Prabhat Samgiita Events',l:'https://prabhatasamgiita.net/'},
 {t:'Disaster Relief',l:'https://anandamarga.org'}
];
function loadTicker(){
 amTicker.innerHTML=amItems.map(i=>
   `<a href="${i.l}" target="_blank" style="margin-right:40px;color:var(--text);text-decoration:none">${i.t}</a>`
 ).join('');
 amTicker.animate([{transform:'translateX(100%)'},{transform:'translateX(-100%)'}],{duration:26000,iterations:Infinity});
}
loadTicker();

</script>

<style>

:root{
 --g:linear-gradient(120deg,#1e88e5,#4dd0e1);
 --g2:linear-gradient(120deg,#43cea2,#185a9d);  
 --bg:#f0f6fc;--card:#ffffff;--text:#0b1f33;
 --border:#cfdff2;--soft:#e8f1ff;
}
.dark{
 --bg:#0e1623;--card:#162030;--text:#e2edff;
 --border:#22324a;--soft:#1c2a3f;
}
body{margin:0;font-family:'Poppins','Segoe UI',system-ui;background:var(--bg);color:var(--text)}
.sticky{position:sticky;top:0;z-index:100}

.top{background:var(--g);padding:14px;text-align:center;font-size:22px;font-weight:700;color:#fff}
header{background:var(--card);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;padding:10px 14px}

.clock{font-weight:600}
.themeBtn{cursor:pointer;padding:6px 10px;border-radius:12px;border:1px solid var(--border);background:var(--soft)}

/* LEFT SLIDER ONLY */
.left{
 background:var(--card);border:1px solid var(--border);border-radius:18px;
 padding:10px;height:82vh;overflow-y:auto;
}

.searchWrap{padding:4px}
.searchBar{width:94%;padding:9px;border-radius:10cm;border:1px solid var(--border);margin:4px}

.cat{padding:9px;border:1px solid var(--border);border-radius:14px;margin:6px 0;cursor:pointer;background:var(--soft);display:flex;gap:6px;align-items:center}
.cat:hover{background:var(--g);color:#fff}

.layout{display:grid;grid-template-columns:240px 1fr 350px;gap:10px;padding:10px}
.center{padding:0 10px}
.note{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;text-align:center;margin-bottom:10px;font-weight:600}
#dynamic{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;min-height:420px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.smallBox{padding:12px;border:1px solid var(--border);border-radius:14px;text-align:center;background:var(--soft);cursor:pointer}
.smallBox:hover{background:var(--g2);color:#fff}

.right{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:10px}

.newsSection{border:1px solid var(--border);border-radius:14px;margin-bottom:8px}
.newsHeader{padding:6px 8px;font-weight:600;background:var(--soft)}
.newsItem{padding:6px 8px;border-top:1px solid var(--border);cursor:pointer}
.newsItem:hover{background:var(--soft)}

.todoRow{display:flex;justify-content:space-between;margin:6px 0;padding:6px;border:1px solid var(--border);border-radius:10px}
.closeBtn{float:right;cursor:pointer}

.illus{width:26px;opacity:.9}
</style>
</head>

function filterMenu(){
 let v=filter.value.toLowerCase();
 document.querySelectorAll('.cat').forEach(c=>{
  c.style.display=c.innerText.toLowerCase().includes(v)?'flex':'none';
 });
}

function updateDate() {
  const date = new Date();

  const day = String(date.getDate()).padStart(2, '0');
  const month = date.toLocaleString('en-US', { month: 'long' });
  const year = date.getFullYear();
  const weekday = date.toLocaleString('en-US', { weekday: 'long' });

  document.getElementById("dateBox").textContent =
    `${day} ${month} ${year}, ${weekday}`;
}
setInterval(updateDate, 1000);
updateDate();

let weatherChart;
async function weather(city){
 try{
  city = city || cityInput.value || 'Delhi';

  // Primary: Open‑Meteo global
  let geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}`).then(r=>r.json());

  // Fallback to wttr for tiny villages
  if(!geo.results){
    let w = await fetch(`https://wttr.in/${city}?format=j1`).then(r=>r.json());
    winfo.innerHTML = `🌡 ${w.current_condition[0].temp_C}°C<br/>💧 Humidity: ${w.current_condition[0].humidity}%<br/>🍃 Wind: ${w.current_condition[0].windspeedKmph} km/h`;
    sun.innerHTML = `🌅 Sunrise: ${w.weather[0].astronomy[0].sunrise} | 🌇 Sunset: ${w.weather[0].astronomy[0].sunset}`;
    return;
  }

  let {latitude, longitude, name, country} = geo.results[0];

  let d = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m&daily=temperature_2m_max,sunrise,sunset&timezone=auto`).then(r=>r.json());

  winfo.innerHTML = `<b>${name}, ${country}</b><br/>🌡 ${d.current.temperature_2m}°C<br/>💧 Humidity: ${d.current.relative_humidity_2m}%<br/>🍃 Wind: ${d.current.wind_speed_10m} km/h`;

  sun.innerHTML = `🌅 Sunrise: ${new Date(d.daily.sunrise[0]).toLocaleTimeString()}<br/>🌇 Sunset: ${new Date(d.daily.sunset[0]).toLocaleTimeString()}`;

  if(weatherChart) weatherChart.destroy();
  weatherChart = new Chart(chart.getContext('2d'),{
   type:'line',
   data:{labels:['1','2','3','4','5','6','7'],datasets:[{label:'Temp',data:d.daily.temperature_2m_max}]}
  });
 }catch(e){winfo.innerText='Weather update unavailable';}
}

// Anand Marga Live Ticker – only headings in bar
async function loadTicker(){
 const feeds=[
  'https://anandamarga.org/feed/',
  'https://proutglobe.org/feed/',
  'https://prabhatasamgiita.net/feed/'
 ];
 let all=[];
 for(let f of feeds){
  try{
   let j=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+f).then(r=>r.json());
   all=all.concat(j.items.map(i=>({t:i.title,l:i.link})));
  }catch{}
 }
 tickerText.innerHTML = all.slice(0,12).map(n=>`<span onclick=window.open('${n.l}','_blank')>${n.t} &nbsp; • &nbsp;</span>`).join('');
}

async function loadNews(){
 try{
 const sections={
  'India – NDTV':'https://feeds.feedburner.com/ndtvnews-top-stories',
  'World – The Hindu':'https://www.thehindu.com/news/international/feeder/default.rss',
  'Sports – Indian Express':'https://indianexpress.com/section/sports/feed/'
 };
 let html='';
 for(let t in sections){
  let j=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+sections[t]).then(r=>r.json());
  html+=`<div class='newsSection'><div class='newsHeader'>${t}</div>`+
   j.items.slice(0,5).map(n=>`<div class='newsItem' onclick=window.open('${n.link}','_blank')>${n.title}</div>`).join('')+
   `</div>`;
 }
 news.innerHTML=html;
 }catch(e){news.innerHTML='News update unavailable';}
}
